<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Pedidos</title>
</head>
<body>

<script>
    let itensPedido = [];
    let cpfAnterior = '';
    window.onload = function () {
        const hoje = new Date().toISOString().split('T')[0];
        document.getElementById('dataCadastroPedido').value = hoje;
    };

    function mascararCPF(valor) {
        if (!valor) return '';

        let cpf = valor.replace(/\D/g, '');

        if (cpf.length > 11) {
            cpf = cpf.substring(0, 11);
        }

        cpf = cpf.replace(/(\d{3})(\d)/, '$1.$2');
        cpf = cpf.replace(/(\d{3})(\d)/, '$1.$2');
        cpf = cpf.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
        return cpf;
    }
    function formatarDataInput(data) {
        const ano = data.getFullYear();
        const mes = String(data.getMonth() + 1).padStart(2, '0');
        const dia = String(data.getDate()).padStart(2, '0');
        return `${ano}-${mes}-${dia}`;
    }
    function adicionarItem() {

        const idProduto = document.getElementById('idProduto').value;
        const quantidade = document.getElementById('quantidade').value;
        const descontoInput = document.getElementById('descontoPedido').value;
        const desconto = descontoInput ? Number(descontoInput) : 0.00;

        if (!idProduto || !quantidade) {
            alert("Informe ID do produto e quantidade.");
            return;
        }

        itensPedido.push({
            idProduto: Number(idProduto),
            quantidade: Number(quantidade),
            desconto: desconto
        });

        renderizarItensTemporarios();

        document.getElementById('idProduto').value = '';
        document.getElementById('quantidade').value = '';
        document.getElementById('descontoPedido').value = '0.00';
    }
    function renderizarItensTemporarios() {

        const container = document.getElementById('itensTemporarios');
        container.innerHTML = '';

        if (itensPedido.length === 0) return;

        let html = `
        <table border="1" cellpadding="6" style="border-collapse: collapse; width:100%;">
            <thead>
                <tr>
                    <th>ID Produto</th>
                    <th>Quantidade</th>
                    <th>Desconto</th>
                    <th>Ação</th>
                </tr>
            </thead>
            <tbody>
    `;

        itensPedido.forEach((item, index) => {
            html += `
            <tr>
                <td>${item.idProduto}</td>
                <td>${item.quantidade}</td>
                <td>${item.desconto}</td>
                <td>
                    <button onclick="removerItem(${index})">Remover</button>
                </td>
            </tr>
        `;
        });

        html += `</tbody></table>`;

        container.innerHTML = html;
    }
    function removerItem(index) {
        itensPedido.splice(index, 1);
        renderizarItensTemporarios();
    }

    function atualizarCPF(input) {

        input.value = mascararCPF(input.value);

        const cpfAtual = input.value.replace(/\D/g, '');

        if (cpfAnterior && cpfAnterior !== cpfAtual && itensPedido.length > 0) {
            if (!confirm("Trocar cliente removerá todos os itens. Deseja continuar?")) {
                input.value = mascararCPF(cpfAnterior);
                return;
            }
            limparItensPedido();
        }

        cpfAnterior = cpfAtual;
    }

    function limparItensPedido() {
        itensPedido = [];
        renderizarItensTemporarios();
    }

    function criarPedido() {

        let cpfClienteComMascara = document.getElementById('cpfCliente').value;
        let cpfCliente = cpfClienteComMascara.replace(/\D/g, '');

        if (!cpfCliente) {
            alert("Informe o CPF do cliente.");
            return;
        }

        if (itensPedido.length === 0) {
            alert("Adicione pelo menos um produto.");
            return;
        }

        const pedido = {
            cpfCliente: cpfCliente,
            dataPedido: document.getElementById('dataCadastroPedido').value,
            itens: itensPedido
        };

        fetch('/pedidos', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(pedido)
        })
            .then(response => {
                if (response.ok) {
                    alert('Pedido criado com sucesso!');

                    // limpar tudo
                    itensPedido = [];
                    renderizarItensTemporarios();
                    document.getElementById('cpfCliente').value = '';
                    document.getElementById('idProduto').value = '';
                    document.getElementById('quantidade').value = '';
                    document.getElementById('descontoPedido').value = '';
                } else {
                    alert('Erro ao criar pedido');
                }
            });
    }

    function atualizarPeriodo() {
        let inicio = document.getElementById('inicio').value;
        let fim = document.getElementById('fim').value;
        //Automatiza o período quando apenas um for preenchido.
        if (inicio && !fim) {
            const dataInicio = new Date(inicio + "T00:00:00");
            const ultimoDia = new Date(dataInicio.getFullYear(), dataInicio.getMonth() + 1, 0);
            fim = formatarDataInput(ultimoDia);
            document.getElementById('fim').value = fim;
        }

        if (fim && !inicio) {
            const dataFim = new Date(fim + "T00:00:00");
            const primeiroDia = new Date(dataFim.getFullYear(), dataFim.getMonth(), 1);
            inicio = formatarDataInput(primeiroDia);
            document.getElementById('inicio').value = inicio;
        }
    }

    function buscarPedidos() {
        const idPedido = document.getElementById('idPedidoBuscar').value;
        const idProduto = document.getElementById('idProdutoBuscar').value;
        cpfClienteComMascara = document.getElementById('cpfClienteBuscar').value;
        cpfCliente = cpfClienteComMascara.replace(/\D/g, '');
        const inicio = document.getElementById('inicio').value  || null;
        const fim = document.getElementById('fim').value  || null;

        if (inicio && fim) {
            const dataInicio = new Date(inicio);
            const dataFim = new Date(fim);

            if (dataFim < dataInicio) {
                alert("A data final não pode ser menor que a data inicial.");
                return; // interrompe a busca
            }
        }

        let url = `/pedidos/buscar?`;
        if (idPedido)
            url += `idPedido=${encodeURIComponent(idPedido)}&`;

        if (idProduto)
            url += `idProduto=${encodeURIComponent(idProduto)}&`;

        if (cpfCliente)
            url += `cpfCliente=${encodeURIComponent(cpfCliente)}&`;

        if (inicio)
            url += `dtInicio=${encodeURIComponent(inicio)}&`;

        if (fim)
            url += `dtFim=${encodeURIComponent(fim)}`;

        fetch(url)
            .then(res => res.json())
            .then(data => {
                renderizarPedidos(data);
            });
    }

    function renderizarPedidos(pedidos) {

        const container = document.getElementById('resultadoPedidosCliente');
        container.innerHTML = '';

        if (!pedidos || pedidos.length === 0) {
            container.innerHTML = '<p>Nenhum pedido encontrado.</p>';
            return;
        }

        // 🔹 Agrupar por clientes para totalizador
        const clientesAgrupados = {};

        pedidos.forEach(c => {
            if (!clientesAgrupados[c.clienteCpf]) {
                clientesAgrupados[c.clienteCpf] = {
                    clienteNome: c.clienteNome,
                    clienteCpf: c.clienteCpf,
                    pedidos : {},
                    totalCliente: 0
                };
            }

            const cliente = clientesAgrupados[c.clienteCpf];

            // 🔹 Agrupar pedidos dentro do cliente
            if (!cliente.pedidos[c.pedidoId]) {
                cliente.pedidos[c.pedidoId] = {
                    pedidoId: c.pedidoId,
                    data: c.pedidoData,
                    itens: []
                };
            }

            cliente.pedidos[c.pedidoId].itens.push({
                produtoNome: c.produtoNome,
                quantidade: Number(c.produtoQtd),
                valor: Number(c.produtoValor),
                desconto: Number(c.produtoDesconto)
            });
        });

        // 🔹 Renderização
        Object.values(clientesAgrupados).forEach(cliente => {

            let html = `
            <div style="border:2px solid #444; padding:15px; margin-bottom:30px;">
                <h2>${cliente.clienteNome} - ${mascararCPF(cliente.clienteCpf)}</h2>
        `;

            Object.values(cliente.pedidos).forEach(pedido => {

                let totalPedido = 0;

                html += `
                <h3>Pedido #${pedido.pedidoId} - ${formatarData(pedido.data)}</h3>
                <table border="1" cellpadding="6" style="border-collapse: collapse; width:100%;">
                    <thead>
                        <tr>
                            <th>Produto</th>
                            <th>Qtd</th>
                            <th>Valor</th>
                            <th>Desconto</th>
                            <th>Total Item</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

                pedido.itens.forEach(item => {

                    const totalItem = (item.valor * item.quantidade) - item.desconto;
                    totalPedido += totalItem;
                    cliente.totalCliente += totalItem;

                    html += `
                    <tr>
                        <td>${item.produtoNome}</td>
                        <td>${item.quantidade}</td>
                        <td>R$ ${item.valor.toFixed(2)}</td>
                        <td>R$ ${item.desconto.toFixed(2)}</td>
                        <td><strong>R$ ${totalItem.toFixed(2)}</strong></td>
                    </tr>
                `;
                });

                html += `
                    </tbody>
                </table>
                <p style="text-align:right;">
                    <strong>Total do Pedido: R$ ${totalPedido.toFixed(2)}</strong>
                </p>
            `;
            });

            // 🔹 Total do Cliente (exigência do desafio)
            html += `
            <hr>
            <p style="text-align:right; font-size:18px;">
                <strong>Total Geral do Cliente: R$ ${cliente.totalCliente.toFixed(2)}</strong>
            </p>
            </div>
        `;

            container.innerHTML += html;
        });
    }

    function formatarData(data) {
        if (!data) return '';
        const partes = data.split('-');
        return `${partes[2]}/${partes[1]}/${partes[0]}`;
    }

    function voltar() {
        history.back();
    }
</script>

<h2>Criar Pedido</h2>

<label>CPF do Cliente:</label>
<input type="text" id="cpfCliente" maxlength="14" oninput= "atualizarCPF(this)"><br><br>

<label>ID Produto:</label>
<input type="number" id="idProduto"><br><br>

<label>Quantidade:</label>
<input type="number" id="quantidade"><br><br>

<label>Desconto:</label>
<input type="number" id="descontoPedido" step="0.01" value="0.00"  onblur="if(this.value==='') this.value='0.00'"><br><br>

<label>Data de Cadastro:</label>
<input type="date" id="dataCadastroPedido"><br><br>

<button type="button" onclick="adicionarItem()">Adicionar Produto</button>

<h4>Itens do Pedido</h4>
<div id="itensTemporarios"></div>
<br>

<button onclick="criarPedido()">Criar Pedido</button>

<h3>Buscar</h3>
<label>ID do pedido:</label>
<input type="number" id="idPedidoBuscar"><br><br>

<label>CPF do cliente:</label>
<input type="text" id="cpfClienteBuscar" maxlength="14" oninput= "this.value = mascararCPF(this.value)"><br><br>

<label>ID do produto:</label>
<input type="number" id="idProdutoBuscar"><br><br>

<label>Período:</label>
<input type="date" id="inicio" oninput="atualizarPeriodo()">
<input type="date" id="fim" oninput="atualizarPeriodo()">

<button onclick="buscarPedidos()">Buscar</button>

<div id="resultadoPedidosCliente"></div>

<button onclick="voltar()">Voltar</button>
</body>
</html>
