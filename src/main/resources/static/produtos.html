<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Produtos</title>
</head>
<body>
<script>
    window.onload = function () {
        const hoje = new Date().toISOString().split('T')[0];
        document.getElementById('dataCadastroProduto').value = hoje;
    };

    function voltar() {
        history.back();
    };

    function cadastrarProduto() {

        const produto = {
            nomeProduto: document.getElementById('nomeProduto').value,
            descricaoProduto: document.getElementById('descricaoProduto').value,
            valorProduto: document.getElementById('valorProduto').value,
            quantidadeEstoque: document.getElementById('qtdProduto').value,
            dataCadastroProduto: document.getElementById('dataCadastroProduto').value
        };

        fetch('/produtos', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(produto)
        })
            .then(res => {
                document.getElementById('msgCadastroProduto').innerText =
                    res.ok ? 'Produto cadastrado com sucesso!' : 'Erro ao cadastrar produto';
            });
    }

    function buscarProduto() {
        const nome = document.getElementById('nomeProdutoBuscar').value;
        const id = document.getElementById('idProdutoBuscar').value;

        let url = `/produtos/buscar?`;
        if (nome) {
            url += `nome=${encodeURIComponent(nome)}&`;
        }

        if (id) {
            url += `id=${encodeURIComponent(id)}`;
        }
        fetch(url)
            .then(res => res.json())
            .then(data => {
                const lista = document.getElementById('listaProdutos');
                lista.innerHTML = '';

                data.forEach(produto => {
                    const li = document.createElement('li');
                    li.textContent =
                        produto.nomeProduto +
                        ' | ' + produto.idProduto +
                        ' | ' + produto.descricaoProduto +
                        ' | R$ ' + produto.valorProduto +
                        ' | Estoque: ' + produto.quantidadeEstoque;
                    lista.appendChild(li);
                });
            });
    }
</script>
<h2>Produtos – Summer Taste</h2>

<!-- CADASTRO -->
<h3>Cadastrar Produto</h3>

<label>Nome:</label>
<input type="text" id="nomeProduto"><br><br>

<label>Descrição:</label>
<input type="text" id="descricaoProduto"><br><br>

<label>Valor:</label>
<input type="number" id="valorProduto" step="0.01"><br><br>

<label>Quantidade em Estoque:</label>
<input type="number" id="qtdProduto"><br><br>

<label>Data de Cadastro:</label>
<input type="date" id="dataCadastroProduto"><br><br>

<button onclick="cadastrarProduto()">Cadastrar</button>

<p id="msgCadastroProduto"></p>

<hr>

<h3>Buscar</h3>
<label>Nome:</label>
<input type="text" id="nomeProdutoBuscar">
<label>ID:</label>
<input type="text" id="idProdutoBuscar">
<button onclick="buscarProduto()">Buscar</button>

<!-- LISTAGEM -->
<h3>Lista de Produtos</h3>


<ul id="listaProdutos"></ul>

</body>
</html>

<button onclick="voltar()">Voltar</button>
