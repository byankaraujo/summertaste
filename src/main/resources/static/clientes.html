<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Clientes</title>
</head>
<body>
<script>
    window.onload = function () {
        const hoje = new Date().toISOString().split('T')[0];
        document.getElementById('dataCadastroCliente').value = hoje;
    };

    function cadastrarCliente() {
        cpfCliente = document.getElementById('cpfCliente').value;
        cpfClienteSemMascara = cpfCliente.replace(/\D/g, '');
        const cliente = {
            nomeCliente: document.getElementById('nomeCliente').value,
            cpfCliente: cpfClienteSemMascara,
            emailCliente: document.getElementById('emailCliente').value,
            dataCadastroCliente: document.getElementById('dataCadastroCliente').value
        };

        fetch('/clientes', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(cliente)
        })
            .then(res => {
                if (res.ok) {
                    document.getElementById('msgCadastroCliente').innerText =
                        'Cliente cadastrado com sucesso!';
                } else {
                    document.getElementById('msgCadastroCliente').innerText =
                        'Erro ao cadastrar cliente.';
                }
            });
    }

    function mascararCPF(valor) {
        if (!valor) return '';

        let cpf = valor.replace(/\D/g, '');

        if (cpf.length > 11) {
            cpf = cpf.substring(0, 11);
        }

        cpf = cpf.replace(/(\d{3})(\d)/, '$1.$2');
        cpf = cpf.replace(/(\d{3})(\d)/, '$1.$2');
        cpf = cpf.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
        return cpf;
    }

    function buscarCliente() {

        const nome = document.getElementById('nomeClienteBusca').value;
        const cpf = document.getElementById('cpfClienteBusca').value.replace(/\D/g, '');

        let url = `/clientes/buscar?`;
        if (nome) {
            url += `nome=${encodeURIComponent(nome)}&`;
        }

        if (cpf) {
            url += `cpf=${encodeURIComponent(cpf)}`;
        }
        fetch(url)
            .then(res => res.json())
            .then(data => {

                const lista = document.getElementById('listaClientes');
                lista.innerHTML = '';

                if (data.length === 0) {
                    lista.innerHTML = '<li>Nenhum cliente encontrado</li>';
                    return;
                }

                data.forEach(cliente => {
                    const li = document.createElement('li');
                    li.textContent =
                        cliente.nomeCliente +
                        ' | CPF: ' + mascararCPF(cliente.cpfCliente) +
                        ' | Email: ' + cliente.emailCliente;
                    lista.appendChild(li);
                });
            });
    }

    function voltar() {
        history.back();
    };
</script>
<h2>Clientes</h2>

<h3>Cadastrar Cliente</h3>

<label>Nome:</label>
<input type="text" id="nomeCliente"><br><br>

<label>CPF:</label>
<input type="text" id="cpfCliente" maxlength="14" oninput= "this.value = mascararCPF(this.value)"><br><br>

<label>Email:</label>
<input type="email" id="emailCliente"><br><br>

<label>Data de Cadastro:</label>
<input type="date" id="dataCadastroCliente"><br><br>

<button onclick="cadastrarCliente()">Cadastrar</button>

<p id="msgCadastroCliente"></p>

</body>
</html>
<h3>Buscar</h3>
<label>Nome:</label>
<input type="text" id="nomeClienteBusca">
<label>CPF:</label>
<input type="text" id="cpfClienteBusca" maxlength="14" oninput= "this.value = mascararCPF(this.value)">
<button onclick="buscarCliente()">Buscar</button>
<ul id="listaClientes"></ul>

<button onclick="voltar()">Voltar</button>
